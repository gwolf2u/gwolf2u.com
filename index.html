<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Gwolf2u.com - not available, ofc 🐺</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐺</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0F1729;
      --bg-card: #131C2E;
      --accent: #4577a8;
      --text-main: #F8FAFC;
      --glass: rgba(19, 28, 46, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    /* Canvas for Network Animation */
    #network-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 20px;
      position: relative;
      z-index: 2;
    }
    
    /* Header */
    header {
      text-align: center;
      margin-bottom: 50px;
    }
    
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 30px;
      color: var(--text-main);
      text-shadow: 0 0 10px rgba(69, 119, 168, 0.4);
    }
    
    /* Avatar Container with Animation */
    .profile-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 30px;
    }
    
    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid var(--bg-card); /* Dark border for contrast */
      box-shadow: 0 0 25px rgba(69, 119, 168, 0.3);
      z-index: 2;
      position: relative;
    }
    
    /* Spinning Rings */
    .profile-wrapper::before {
      content: '';
      position: absolute;
      top: -5px; left: -5px; right: -5px; bottom: -5px;
      border-radius: 50%;
      border: 2px dashed var(--accent);
      opacity: 0.6;
      z-index: 1;
      animation: spin 8s linear infinite;
    }
    
    .profile-wrapper::after {
      content: '';
      position: absolute;
      top: -10px; left: -10px; right: -10px; bottom: -10px;
      border-radius: 50%;
      border: 1px solid rgba(69, 119, 168, 0.1);
      z-index: 1;
      animation: spin 15s linear infinite reverse;
    }
    
    /* Scanning Line Animation */
    .scan-line {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(to bottom, transparent, rgba(69, 119, 168, 0.3), transparent);
      z-index: 3;
      pointer-events: none;
      opacity: 0.5;
      animation: scan 3s ease-in-out infinite;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes scan {
      0% { top: -10%; opacity: 0; }
      50% { opacity: 0.8; }
      100% { top: 110%; opacity: 0; }
    }
    
    /* Intro Text */
    .intro-box {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--accent);
      padding: 25px 40px;
      margin-bottom: 50px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .intro-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 20px; height: 20px;
      border-top: 2px solid var(--accent);
      border-left: 2px solid var(--accent);
    }
    
    .intro-box::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0; width: 20px; height: 20px;
      border-bottom: 2px solid var(--accent);
      border-right: 2px solid var(--accent);
    }
    
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      font-weight: 300;
    }
    
    /* Wolf Icon */
    .wolf-section {
      text-align: center;
      margin: 40px 0;
    }
    
    .wolf-icon {
      font-size: 3.5rem;
      color: var(--text-main);
      display: inline-block;
      filter: drop-shadow(0 0 5px rgba(248, 250, 252, 0.2));
    }
    
    /* Links */
    .section-title {
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 25px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
    }
    
    .links-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .link-card {
      display: flex;
      align-items: center;
      padding: 18px 25px;
      background: var(--bg-dark);
      border-left: 3px solid #1e293b;
      border-radius: 0 4px 4px 0;
      color: var(--text-main);
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .link-card:hover {
      background: var(--bg-card);
      border-left-color: var(--accent);
      padding-left: 35px;
      box-shadow: 0 4px 15px rgba(69, 119, 168, 0.15);
    }
    
    .link-icon {
      font-size: 1.5rem;
      margin-right: 20px;
      width: 30px;
      text-align: center;
      color: #64748b;
      transition: color 0.3s ease;
    }
    
    .link-card:hover .link-icon {
      color: var(--accent);
    }
    
    .link-text {
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
    }
    
    /* Footer */
    .footer {
      margin-top: 60px;
      padding: 20px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      color: #64748b;
      font-size: 0.9rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      .link-card { padding: 15px; }
      .link-text { font-size: 1rem; }
      .wolf-icon { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <canvas id="network-canvas"></canvas>
  
  <div class="container">
    <header>
      <h1>About Me</h1>
      <div class="profile-wrapper">
        <div class="scan-line"></div>
        <img src="https://avatars.githubusercontent.com/u/877292" alt="Lup Gabriel" class="profile-img">
      </div>
      <div class="intro-box">
        <p>Hey, I'm Gabriel<br>As always, my website is not quite ready yet... Might do something here or might not.</p>
      </div>
    </header>
    
    <div class="wolf-section">
      <span class="wolf-icon">🐺</span>
    </div>
    
    <div class="section-title">Connect</div>
    
    <div class="links-container">
      <a href="https://crdroid.net" class="link-card">
        <i class="fab fa-android link-icon"></i>
        <span class="link-text">crDroid - Custom ROMs</span>
      </a>
      
      <a href="https://github.com/crdroidandroid" class="link-card">
        <i class="fab fa-github link-icon"></i>
        <span class="link-text">crDroid GitHub</span>
      </a>
      
      <a href="https://github.com/gwolf2u" class="link-card">
        <i class="fab fa-github link-icon"></i>
        <span class="link-text">My Personal GitHub</span>
      </a>
    </div>
    
    <div class="footer">
      &copy; 2015-<script>document.write(new Date().getFullYear())</script>
    </div>
  </div>

  <script>
    // --- NETWORK BACKGROUND ANIMATION ---
    const canvas = document.getElementById('network-canvas');
    const ctx = canvas.getContext('2d');
    
    let particlesArray;
    
    // Resize Canvas
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // Handle Resize
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        init();
    });
    
    // Mouse Position
    const mouse = {
        x: null,
        y: null,
        radius: (canvas.height/80) * (canvas.width/80)
    }
    
    window.addEventListener('mousemove', (event) => {
        mouse.x = event.x;
        mouse.y = event.y;
    });
    
    // Particle Class
    class Particle {
        constructor(x, y, directionX, directionY, size, color) {
            this.x = x;
            this.y = y;
            this.directionX = directionX;
            this.directionY = directionY;
            this.size = size;
            this.color = color;
        }
        
        // Draw individual particle
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
            ctx.fillStyle = '#4577a8';
            ctx.fill();
        }
        
        // Update particle position & handle network connections
        update() {
            if (this.x > canvas.width || this.x < 0) {
                this.directionX = -this.directionX;
            }
            if (this.y > canvas.height || this.y < 0) {
                this.directionY = -this.directionY;
            }
            
            // Mouse Interaction
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx*dx + dy*dy);
            
            if (distance < mouse.radius + this.size){
                if (mouse.x < this.x && this.x < canvas.width - this.size * 10) {
                    this.x += 3;
                }
                if (mouse.x > this.x && this.x > this.size * 10) {
                    this.x -= 3;
                }
                if (mouse.y < this.y && this.y < canvas.height - this.size * 10) {
                    this.y += 3;
                }
                if (mouse.y > this.y && this.y > this.size * 10) {
                    this.y -= 3;
                }
            }
            
            // Move particle
            this.x += this.directionX;
            this.y += this.directionY;
            
            this.draw();
        }
    }
    
    // Initialize particles
    function init() {
        particlesArray = [];
        // Calculate number of particles based on screen size
        let numberOfParticles = (canvas.height * canvas.width) / 9000;
        
        for (let i = 0; i < numberOfParticles; i++) {
            let size = (Math.random() * 2) + 1;
            let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
            let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
            let directionX = (Math.random() * 1) - 0.5;
            let directionY = (Math.random() * 1) - 0.5;
            let color = '#4577a8';
            
            particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
        }
    }
    
    // Animation Loop
    function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0,0,innerWidth, innerHeight);
        
        for (let i = 0; i < particlesArray.length; i++) {
            particlesArray[i].update();
        }
        
        connect();
    }
    
    // Draw lines between particles
    function connect() {
        let opacityValue = 1;
        for (let a = 0; a < particlesArray.length; a++) {
            for (let b = a; b < particlesArray.length; b++) {
                let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                               ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                
                if (distance < (canvas.width/7) * (canvas.height/7)) {
                    opacityValue = 1 - (distance/20000);
                    ctx.strokeStyle = 'rgba(69, 119, 168,' + opacityValue * 0.2 + ')'; // Use accent color
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                    ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                    ctx.stroke();
                }
            }
        }
    }
    
    init();
    animate();
  </script>
</body>
</html>
